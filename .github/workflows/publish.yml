name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/skeleton-replay
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups --python "$(cat .python-version)"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as reader:
              print(tomllib.load(reader)["project"]["version"])
          PY
          )"
          test "v${PACKAGE_VERSION}" = "${GITHUB_REF_NAME}"

      - name: Check
        run: make check

      - name: Build distributions
        run: uv build

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
